<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 690" width="1600" height="2400">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#57606a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#eaeef2" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="460" height="690" fill="#ffffff"/>
  <rect width="460" height="690" fill="url(#grid)" opacity="0.5"/>

  <!-- Edges -->
  <path d="M 210 90 L 210 162" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 168 220 L 168 240 L 110 240 L 110 292" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 68 350 L 68 370 L 210 370 L 210 422" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 210 480 L 210 552" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 180 340 L 210 340 L 210 310 L 232 310" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 252 220 L 252 240 L 352 240 L 352 292" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <rect x="140" y="40" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="210" y="66" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Start</text>
  <g filter="url(#shadow)">
    <rect x="140" y="170" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="210" y="196" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Authenticate</text>
  <g filter="url(#shadow)">
    <rect x="40" y="300" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="110" y="326" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Validate Input</text>
  <g filter="url(#shadow)">
    <rect x="240" y="300" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="310" y="326" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Error</text>
  <g filter="url(#shadow)">
    <rect x="140" y="430" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="210" y="456" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Process Data</text>
  <g filter="url(#shadow)">
    <rect x="140" y="560" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="210" y="586" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Success</text>
</svg>