<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 532" width="412" height="532">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#57606a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#eaeef2" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="412" height="532" fill="#ffffff"/>
  <rect width="412" height="532" fill="url(#grid)" opacity="0.5"/>

  <!-- Edges -->
  <path d="M 100 80 L 100 120" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 58 178 L 58 198 L 100 198 L 100 218" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 58 276 L 58 296 L 100 296 L 100 316" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 100 374 L 100 414" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 170 266 L 191 266 L 191 236 L 204 236" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 142 178 L 142 198 L 142 202 L 324 202 L 324 206 L 324 218" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <rect x="30" y="30" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="100" y="56" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Start</text>
  <g filter="url(#shadow)">
    <rect x="30" y="128" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="100" y="154" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Authenticate</text>
  <g filter="url(#shadow)">
    <rect x="30" y="226" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="100" y="252" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Validate Input</text>
  <g filter="url(#shadow)">
    <rect x="212" y="226" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="282" y="252" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Error</text>
  <g filter="url(#shadow)">
    <rect x="30" y="324" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="100" y="350" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Process Data</text>
  <g filter="url(#shadow)">
    <rect x="30" y="422" width="140" height="50" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" />
  </g>
  <text x="100" y="448" text-anchor="middle" dominant-baseline="middle" fill="#24292f" font-size="13" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif" letter-spacing="0">Success</text>
</svg>